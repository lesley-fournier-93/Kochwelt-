<!DOCTYPE html>
<html lang="de">
<head>
    <title>Page Title | Kochwelt 367</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style-importer.css">
    <script src="js/main.js"></script>

</head>

<body onload="init()">
    <header id="header"></header>
    <main>


        <section class="contact-form">

            <div class="ct-container">
                <h1>Kontakt&shy;formular</h1>
                Wir freuen uns auf deine Kontaktaufnahme.

                <form onsubmit="sendMail(event)" class="mt-20">

                  <label for="name">
                    Dein Name :
                  </label>
                  <input type="text" id="name" name="Name" placeholder="Vorname Name" required>

                  <label for="email">
                    Deine Email-Adresse :
                  </label>
                  <input type="email" id="email" name="Email-Adresse" placeholder="Deine Email-Adresse" required>

                  <label for="message">
                    Deine Nachricht :
                  </label>
                  <textarea id="message" name="Nachricht"placeholder="Deine Nachricht" required></textarea>

                  <button type="submit" class="btn-default mt-05"><img src="icons/forward-send_white.svg" alt="send-envelope">Nachricht senden</button>

                </form>

            </div>
       
        </section>
        

    </main>
    <footer id="footer"></footer>

</body>
<script src="js/templates.js"></script>
<script src="js/send_mail.js"></script>
</html>
